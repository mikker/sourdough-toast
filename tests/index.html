<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sourdough Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        background: #eee;
      }
    </style>
    <link rel="stylesheet" href="../src/sourdough-toast.css" />
    <script type="module">
      import { Sourdough, toast } from "../src/sourdough-toast.js";

      const sourdough = new Sourdough();

      window.addEventListener("DOMContentLoaded", () => {
        sourdough.boot();
      });

      window.toast = toast;
    </script>
  </head>
  <body>
    <button onclick="toast('Basic toast')">Basic</button>
    <button onclick="toast.success('Success toast')">Success</button>
    <button onclick="toast.info('Info toast')">Info</button>
    <button onclick="toast.warning('Warning toast')">Warning</button>
    <button onclick="toast.error('Error toast')">Error</button>
    <button
      onclick="toast.message({ title: 'With Close Button', closeButton: true })"
    >
      With Close Button
    </button>
    <button
      onclick="
        toast.message({
          title: 'With HTML',
          html: true,
          description:
            '<strong>HTML</strong> content <button data-toast-dismiss>Confirm</button>',
        })
      "
    >
      With HTML
    </button>
    <button onclick="toast('Persistent toast', { persist: true })">
      Persist
    </button>
    <button onclick="toast.error('Persistent error', { persist: true })">
      Persist Error
    </button>
    <button
      onclick="
        toast(
          'This is a much longer persistent toast message that should wrap nicely alongside the close button',
          { persist: true },
        )
      "
    >
      Persist Long
    </button>
  </body>
</html>
